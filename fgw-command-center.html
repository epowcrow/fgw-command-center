<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FGW Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f6f3;--surface:#fff;--s2:#f0efe9;--border:rgba(0,0,0,.08);--borderS:rgba(0,0,0,.15);--text:#1a1917;--muted:#706e68;--hint:#a09e98;--red:#c0392b;--red-bg:#fdf0ef;--amber:#b7770d;--amber-bg:#fdf6e3;--green:#2e7d32;--green-bg:#f0f7f0;--blue:#1565c0;--blue-bg:#e8f0fe;--teal:#00695c;--teal-bg:#e0f2f1;--purple:#5e35b1;--purple-bg:#ede7f6;--gray:#546e7a;--gray-bg:#eceff1;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--r:8px;--rl:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:8px}
.load-logo{font-family:var(--mono);font-size:36px;font-weight:500;letter-spacing:.1em}
.load-txt{font-size:13px;color:var(--muted);letter-spacing:.05em}
.load-bar{width:140px;height:2px;background:var(--border);border-radius:2px;margin-top:20px;overflow:hidden}
.load-fill{height:100%;background:var(--text);border-radius:2px;animation:lf 1.8s ease forwards}
@keyframes lf{from{width:0}to{width:100%}}
#shell{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:50px;position:sticky;top:0;z-index:100}
.tb-left{display:flex;align-items:center;gap:16px}
.tb-logo{font-family:var(--mono);font-size:14px;font-weight:500;letter-spacing:.08em}
.tb-nav{display:flex;gap:3px}
.nb{padding:4px 11px;border:none;background:transparent;color:var(--muted);font-family:var(--font);font-size:12px;cursor:pointer;border-radius:var(--r);transition:all .15s}
.nb:hover{background:var(--s2);color:var(--text)}
.nb.on{background:var(--text);color:#fff}
.tb-right{display:flex;align-items:center;gap:10px}
.wx-pill{font-size:11px;color:var(--muted);background:var(--s2);padding:3px 9px;border-radius:20px}
.clk{font-family:var(--mono);font-size:12px;color:var(--muted)}
.run-btn{padding:5px 13px;background:var(--text);color:#fff;border:none;border-radius:var(--r);font-family:var(--font);font-size:12px;cursor:pointer;transition:opacity .15s}
.run-btn:hover{opacity:.85}
.run-btn.loading{opacity:.5;cursor:not-allowed}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 20px 14px}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.hdr-date{font-size:22px;font-weight:500;line-height:1.2}
.hdr-sub{font-size:13px;color:var(--muted);margin-top:2px}
.hdr-r{text-align:right}
.hdr-time{font-family:var(--mono);font-size:18px;font-weight:500}
.hdr-wx{font-size:12px;color:var(--muted);margin-top:2px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}
.sc{background:var(--s2);border-radius:var(--r);padding:9px 11px;text-align:center}
.sv{font-size:20px;font-weight:500}
.sl{font-size:11px;color:var(--muted);margin-top:2px}
.prog-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px}
.prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s ease}
.main{display:grid;grid-template-columns:1fr 320px;flex:1}
.left{border-right:1px solid var(--border);overflow-y:auto;min-height:0}
.right{overflow-y:auto;background:var(--surface)}
.tab-bar{display:flex;gap:5px;padding:10px 20px 0;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10}
.tb{padding:6px 13px;border:none;background:transparent;color:var(--muted);font-family:var(--font);font-size:12px;cursor:pointer;border-radius:var(--r) var(--r) 0 0;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tb:hover{color:var(--text)}
.tb.on{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.sec{padding:14px 20px;border-bottom:1px solid var(--border)}
.sec:last-child{border-bottom:none}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.st{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.sc2{font-size:11px;color:var(--hint)}
.brief-txt{font-size:13px;line-height:1.75;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface)}
.tr{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)}
.tr:last-child{border-bottom:none;padding-bottom:0}
.tr:first-child{padding-top:0}
.tr.done{opacity:.4}
.chk{width:16px;height:16px;border:1.5px solid var(--borderS);border-radius:4px;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:transparent}
.chk:hover{border-color:var(--text)}
.chk.ck{background:var(--green);border-color:var(--green)}
.chk.ck::after{content:'';display:block;width:9px;height:5px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translate(1px,-1px)}
.tb2{flex:1;min-width:0}
.tt{font-size:13px;font-weight:500;line-height:1.4}
.tr.done .tt{text-decoration:line-through}
.tm{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
.task-links{display:flex;gap:8px;margin-top:3px;align-items:center}
.task-link{font-size:11px;color:var(--blue);text-decoration:none;background:none;border:none;cursor:pointer;padding:0;font-family:var(--font)}
.task-link:hover{text-decoration:underline}
.tr-r{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.est{font-size:11px;color:var(--hint);font-family:var(--mono)}
.bdg{display:inline-block;font-size:10px;font-weight:500;padding:2px 6px;border-radius:4px;white-space:nowrap}
.b-red{background:var(--red-bg);color:var(--red)}
.b-amb{background:var(--amber-bg);color:var(--amber)}
.b-grn{background:var(--green-bg);color:var(--green)}
.b-blu{background:var(--blue-bg);color:var(--blue)}
.b-tel{background:var(--teal-bg);color:var(--teal)}
.b-pur{background:var(--purple-bg);color:var(--purple)}
.b-gry{background:var(--gray-bg);color:var(--gray)}
.blk-row{display:grid;grid-template-columns:80px 1fr auto;gap:9px;align-items:start;padding:7px 0;border-bottom:1px solid var(--border)}
.blk-row:last-child{border-bottom:none}
.bt{font-size:12px;color:var(--muted);font-family:var(--mono);padding-top:1px}
.bl{font-size:13px;font-weight:500}
.bs{font-size:12px;color:var(--muted);margin-top:1px}
.cadd{font-size:11px;padding:3px 8px;border:1px solid var(--borderS);border-radius:var(--r);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s}
.cadd:hover{background:var(--text);color:#fff;border-color:var(--text)}
.cadd.added{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.lead-row{display:flex;align-items:flex-start;justify-content:space-between;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)}
.lead-row:last-child{border-bottom:none}
.ln{font-size:13px;font-weight:500}
.lm{font-size:12px;color:var(--muted);margin-top:1px}
.lr{text-align:right;flex-shrink:0}
.ld{font-size:11px;color:var(--hint);font-family:var(--mono);margin-top:3px}
.cr{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
.cr:last-child{border-bottom:none}
.cn{font-family:var(--mono);font-size:13px;font-weight:500}
.cm{font-size:12px;color:var(--muted);margin-top:1px}
.cal-row{display:flex;gap:9px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border)}
.cal-row:last-child{border-bottom:none}
.ct{font-size:11px;color:var(--muted);font-family:var(--mono);min-width:55px;padding-top:1px}
.ce{font-size:13px;font-weight:500}
.cs{font-size:12px;color:var(--muted);margin-top:1px}
.psec{padding:14px 16px;border-bottom:1px solid var(--border)}
.ptitle{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
.dump{width:100%;min-height:90px;border:1px solid var(--border);border-radius:var(--r);padding:9px 11px;font-family:var(--font);font-size:13px;color:var(--text);background:var(--s2);resize:vertical;outline:none;transition:border-color .15s}
.dump:focus{border-color:var(--borderS);background:var(--surface)}
.dump::placeholder{color:var(--hint)}
.ph-row{display:flex;align-items:center;gap:7px;margin-top:7px}
.ph-btn{display:flex;align-items:center;gap:4px;padding:4px 9px;border:1px dashed var(--borderS);border-radius:var(--r);background:transparent;color:var(--muted);font-family:var(--font);font-size:12px;cursor:pointer;transition:all .15s}
.ph-btn:hover{border-color:var(--text);color:var(--text)}
#ph-inp{display:none}
.d-acts{display:flex;gap:5px;margin-top:7px}
.db{flex:1;padding:6px;border:1px solid var(--border);border-radius:var(--r);background:transparent;font-family:var(--font);font-size:12px;cursor:pointer;transition:all .15s;color:var(--muted)}
.db:hover{background:var(--s2);color:var(--text)}
.db.pri{background:var(--text);color:#fff;border-color:var(--text)}
.db.pri:hover{opacity:.85}
.inbox-row{display:flex;flex-direction:column;gap:6px;padding:7px 0;border-bottom:1px solid var(--border)}
.inbox-row:last-child{border-bottom:none}
.ix-head{display:flex;align-items:flex-start;gap:7px}
.ix-t{flex:1;font-size:13px;line-height:1.4}
.ix-d{font-size:11px;color:var(--muted);margin-top:2px}
.ix-acts{display:flex;gap:3px;flex-shrink:0}
.ix-btn{padding:2px 7px;border:1px solid var(--border);border-radius:4px;background:transparent;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s}
.ix-btn:hover{background:var(--s2)}
.ix-btn.ok{color:var(--green);border-color:var(--green)}
.ix-btn.ok:hover{background:var(--green-bg)}
.ix-edit{display:none;flex-direction:column;gap:6px;background:var(--s2);border-radius:var(--r);padding:10px}
.ix-edit.show{display:flex}
.add-inp{width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--font);font-size:13px;background:var(--s2);color:var(--text);outline:none;margin-bottom:5px}
.add-inp:focus{border-color:var(--borderS);background:var(--surface)}
.add-row{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px}
.add-sel,.add-date{padding:5px 8px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--font);font-size:12px;background:var(--s2);color:var(--text);outline:none;width:100%}
.eod-row{padding:7px 0;border-bottom:1px solid var(--border)}
.eod-row:last-child{border-bottom:none}
.eod-tt{font-size:13px;font-weight:500;margin-bottom:5px}
.eod-btns{display:flex;gap:3px}
.eod-b{flex:1;padding:4px;border:1px solid var(--border);border-radius:var(--r);background:transparent;font-family:var(--font);font-size:11px;cursor:pointer;transition:all .15s;color:var(--muted);text-align:center}
.eod-b.s-done{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.eod-b.s-carry{background:var(--amber-bg);color:var(--amber);border-color:var(--amber)}
.eod-b.s-drop{background:var(--gray-bg);color:var(--gray);border-color:var(--gray)}
.eod-notes{width:100%;min-height:75px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--font);font-size:13px;background:var(--s2);color:var(--text);resize:vertical;outline:none;margin-top:8px}
.eod-pulse{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:11px}
.btn{padding:6px 13px;border-radius:var(--r);font-family:var(--font);font-size:12px;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:transparent;color:var(--muted)}
.btn:hover{background:var(--s2);color:var(--text)}
.btn-p{background:var(--text);color:#fff;border-color:var(--text)}
.btn-p:hover{opacity:.85}
.btn-row{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.fb-area{width:100%;min-height:65px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--font);font-size:13px;background:var(--s2);color:var(--text);resize:vertical;outline:none}
.empty{text-align:center;padding:20px;color:var(--hint);font-size:13px}
.cust-row{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .15s}
.cust-row:hover{opacity:.75}
.cust-row:last-child{border-bottom:none}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;color:var(--muted);background:var(--s2)}
.cname{font-size:13px;font-weight:500}
.cmeta{font-size:12px;color:var(--muted);margin-top:1px}
.clast{font-size:11px;color:var(--hint);margin-top:2px;font-family:var(--mono)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--surface);border-radius:var(--rl);padding:22px;width:360px;max-width:90vw}
.modal-t{font-size:15px;font-weight:500;margin-bottom:5px}
.modal-s{font-size:13px;color:var(--muted);margin-bottom:14px}
.modal-task{background:var(--s2);padding:9px 11px;border-radius:var(--r);font-size:13px;margin-bottom:14px;line-height:1.5}
.modal-lbl{font-size:12px;color:var(--muted);margin-bottom:4px}
.modal-inp{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--font);font-size:13px;background:var(--s2);color:var(--text);outline:none;margin-bottom:8px}
.modal-inp:focus{border-color:var(--borderS)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:9px 18px;border-radius:var(--r);font-size:13px;z-index:9999;pointer-events:none;animation:toast-in .2s ease}
@keyframes toast-in{from{opacity:0;transform:translateX(-50%) translateY(4px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--borderS);border-radius:2px}
@media(max-width:860px){.main{grid-template-columns:1fr}.right{border-top:1px solid var(--border)}.stats{grid-template-columns:repeat(2,1fr)}}
.fade{animation:fi .2s ease forwards}
.settings-wrap{padding:20px 24px;max-width:520px}
.set-lbl{font-size:13px;font-weight:500;margin-bottom:3px}
.set-sub{font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.5}
.set-inp{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--font);font-size:13px;background:var(--s2);color:var(--text);outline:none;margin-bottom:6px}
.set-inp:focus{border-color:var(--borderS);background:var(--surface)}
.set-block{margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid var(--border)}
.set-block:last-child{border-bottom:none}
.url-display{font-family:var(--mono);font-size:11px;background:var(--s2);padding:7px 9px;border-radius:var(--r);color:var(--muted);word-break:break-all;margin-top:6px}
.sync-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:20px}
.sync-badge.ok{background:var(--green-bg);color:var(--green)}
.sync-badge.err{background:var(--red-bg);color:var(--red)}
.sync-badge.syncing{background:var(--amber-bg);color:var(--amber)}
/* Thread detail drawer */
.drawer{position:fixed;top:0;right:0;width:520px;max-width:95vw;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:500;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.12);transform:translateX(100%);transition:transform .2s ease}
.drawer.open{transform:translateX(0)}
.drawer-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0}
.drawer-body{flex:1;overflow-y:auto;padding:18px 20px}
.drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:499;display:none}
.drawer-backdrop.show{display:block}
</style>
</head>
<body>
<div id="loading">
  <div class="load-logo">FGW</div>
  <div class="load-txt">Command Center</div>
  <div class="load-bar"><div class="load-fill"></div></div>
</div>
<div id="shell" style="display:none"></div>

<!-- Thread detail drawer -->
<div class="drawer-backdrop" id="drawer-backdrop" onclick="closeDrawer()"></div>
<div class="drawer" id="thread-drawer">

    </div>

  </div>

  </div>
</div>

<script>
// ================================================================
// SUPABASE CONFIG
// ================================================================
const SB_URL = 'https://jbtmokiuaaoqkoyewbrh.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpidG1va2l1YWFvcWtveWV3YnJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5OTk1MTgsImV4cCI6MjA5MTU3NTUxOH0.D9Id9QUuz9URm3O1fG8z1ZDARRoSu0V2U5Xctx9JY2o';

// ================================================================
// CONFIG — API key and script URL in localStorage (sensitive, browser only)
// ================================================================
const CFG = {
  get key(){ return localStorage.getItem('fgw_key')||'' },
  get url(){ return localStorage.getItem('fgw_url')||'' },
  model: 'claude-sonnet-4-20250514',
  lat: 40.6782, lon: -74.0060,
  domainColors: {FGW:'b-blu',Strategic:'b-pur',BendFlow:'b-tel','Verrité':'b-amb','Jump Box':'b-grn',Wedding:'b-red',Personal:'b-gry',Finance:'b-amb',Legal:'b-red',Calls:'b-gry',Ops:'b-tel'},
  stageColors: {Fresh:'b-grn',Quoted:'b-blu',Negotiating:'b-amb',Approved:'b-tel','In Production':'b-pur','Shipping':'b-blu',Stale:'b-red',Closed:'b-gry'}
};

// ================================================================
// SUPABASE CLIENT — direct REST API calls
// ================================================================
const sb = {
  headers: { 'apikey': SB_ANON, 'Authorization': 'Bearer ' + SB_ANON, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },

  async select(table, filter='', opts={}) {
    let url = `${SB_URL}/rest/v1/${table}?${filter}`;
    if (opts.order) url += `&order=${opts.order}`;
    if (opts.limit) url += `&limit=${opts.limit}`;
    const r = await fetch(url, { headers: this.headers });
    if (!r.ok) throw new Error(`sb.select ${table}: ${r.status}`);
    return r.json();
  },

  async upsert(table, data) {
    const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: { ...this.headers, 'Prefer': 'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify(Array.isArray(data) ? data : [data])
    });
    if (!r.ok) { const t = await r.text(); throw new Error(`sb.upsert ${table}: ${r.status} ${t}`); }
    return r.json();
  },

  async update(table, id, data, idCol='id') {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?${idCol}=eq.${encodeURIComponent(id)}`, {
      method: 'PATCH',
      headers: this.headers,
      body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error(`sb.update ${table}: ${r.status}`);
    return r.json();
  },

  async insert(table, data) {
    const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: this.headers,
      body: JSON.stringify(Array.isArray(data) ? data : [data])
    });
    if (!r.ok) { const t = await r.text(); throw new Error(`sb.insert ${table}: ${r.status} ${t}`); }
    return r.json();
  },

  async delete(table, id, idCol='id') {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?${idCol}=eq.${encodeURIComponent(id)}`, {
      method: 'DELETE', headers: this.headers
    });
    if (!r.ok) throw new Error(`sb.delete ${table}: ${r.status}`);
    return true;
  }
};

async function dbSaveTask(task) {
  try {
    await sb.upsert('tasks', {
      id: task.id, title: task.title||'', meta: task.meta||'',
      bucket: task.bucket||1, domain: task.domain||'FGW',
      est: task.est||'15m', priority: task.priority||'medium',
      status: task.done ? 'done' : (task.eodStatus==='drop' ? 'dropped' : 'open'),
      eod_status: task.eodStatus||null,
      due_date: task.dueDate||null,
      gmail_link: task.gmailLink||null,
      thread_id: task.threadId||null,
      source: task.source||'briefing',
      done: task.done||false,
      urgent: task.urgent||false
    });
  } catch(e) { console.error('dbSaveTask', e.message); }
}

async function dbSaveTasks(tasks) {
  if (!tasks.length) return;
  try {
    const rows = tasks.map(t => ({
      id: t.id, title: t.title||'', meta: t.meta||'',
      bucket: t.bucket||1, domain: t.domain||'FGW',
      est: t.est||'15m', priority: t.priority||'medium',
      status: t.done ? 'done' : (t.eodStatus==='drop' ? 'dropped' : 'open'),
      eod_status: t.eodStatus||null,
      due_date: t.dueDate||null,
      gmail_link: t.gmailLink||null,
      thread_id: t.threadId||null,
      source: t.source||'briefing',
      done: t.done||false,
      urgent: t.urgent||false
    }));
    await sb.upsert('tasks', rows);
  } catch(e) { console.error('dbSaveTasks', e.message); }
}

async function dbSaveInboxItem(item) {
  try {
    await sb.upsert('inbox_items', {
      id: item.id, text: item.text||'',
      domain: item.domain||'FGW', priority: item.priority||'medium',
      date: item.date||null, status: item.status||'pending',
      source: item.source||'manual'
    });
  } catch(e) { console.error('dbSaveInboxItem', e.message); }
}

async function dbSaveEOD(notes, done, carry, dropped, tasks) {
  try {
    await sb.insert('eod_log', {
      notes, done_count: done, carry_count: carry,
      drop_count: dropped, tasks_snapshot: tasks
    });
  } catch(e) { console.error('dbSaveEOD', e.message); }
}

async function dbLoadState() {
  try {
    // Load tasks — open tasks + today's done tasks only (previous days' done tasks are hidden)
    const today = new Date().toISOString().split('T')[0];
    const tasks = await sb.select('tasks', `or=(status.eq.open,and(status.eq.done,updated_at.gte.${today}T00:00:00))&order=created_at.asc`);
    const inbox = await sb.select('inbox_items', `status=eq.pending&order=created_at.desc`, {limit: 50});
    const contacts = await sb.select('contacts', '', {order: 'last_seen.desc', limit: 200});

    return {
      tasks: (tasks||[]).map(dbTaskToLocal),
      inbox: (inbox||[]).map(dbInboxToLocal),
      contacts: contacts||[]
    };
  } catch(e) {
    console.error('dbLoadState', e.message);
    return { tasks: [], inbox: [], contacts: [] };
  }
}

function dbTaskToLocal(t) {
  return {
    id: t.id, title: t.title, meta: t.meta||'',
    bucket: t.bucket||1, domain: t.domain||'FGW',
    est: t.est||'15m', priority: t.priority||'medium',
    done: t.done||false, eodStatus: t.eod_status||null,
    dueDate: t.due_date||null, gmailLink: t.gmail_link||'',
    threadId: t.thread_id||'', source: t.source||'briefing',
    urgent: t.urgent||false
  };
}

function dbInboxToLocal(i) {
  return {
    id: i.id, text: i.text, domain: i.domain||'FGW',
    priority: i.priority||'medium', date: i.date||null,
    status: i.status||'pending', source: i.source||'manual',
    created: i.created_at
  };
}

function fmtDate(){
  return new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric',timeZone:'America/New_York'});
}
function fmtTime(){
  const n=new Date(); let h=n.getHours(),m=n.getMinutes(); const ap=h>=12?'pm':'am'; h=h%12||12;
  return `${h}:${m<10?'0':''}${m}${ap}`;
}
function badge(domain,type='domain'){
  const map = type==='domain' ? CFG.domainColors : CFG.stageColors;
  const cls = map[domain]||'b-gry';
  return `<span class="bdg ${cls}">${domain}</span>`;
}
function initials(n){ if(!n)return'?'; return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function timeAgo(iso){
  const d=new Date(iso), diff=Date.now()-d;
  const mins=Math.floor(diff/60000), hrs=Math.floor(mins/60), days=Math.floor(hrs/24);
  if(days>0)return`${days}d ago`; if(hrs>0)return`${hrs}h ago`; return`${mins}m ago`;
}
function fmtEvtTime(dt){
  if(!dt)return'All day'; const d=new Date(dt); let h=d.getHours(),m=d.getMinutes(); const ap=h>=12?'pm':'am'; h=h%12||12;
  return `${h}:${m<10?'0':''}${m}${ap}`;
}
function fmtMins(m){ return m>=60?`${(m/60).toFixed(1)}h`:`${m}m`; }
function estMins(tasks){
  const map={'5m':5,'10m':10,'15m':15,'20m':20,'30m':30,'45m':45,'60m':60,'90m':90,'2h':120};
  return tasks.filter(t=>!t.done).reduce((a,t)=>a+(map[t.est]||15),0);
}
function toast(msg,err=false){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const t=document.createElement('div'); t.className='toast';
  if(err) t.style.background='var(--red)';
  t.textContent=msg; document.body.appendChild(t);
  setTimeout(()=>t.remove(), err ? 12000 : 4000);
}

async function callAppsScriptGET(params){
  if(!CFG.url) throw new Error('Apps Script URL not set — go to Settings');
  const qs=Object.entries(params).map(([k,v])=>
    `${encodeURIComponent(k)}=${encodeURIComponent(typeof v==='object'?JSON.stringify(v):v)}`
  ).join('&');
  const r=await fetch(`${CFG.url}?${qs}`);
  if(!r.ok) throw new Error('Apps Script error: '+r.status);
  return r.json();
}

async function fetchAppsScript(action, body=null){
  try{ return await callAppsScriptGET(body ? {action,...body} : {action}); }catch(e){ return null; }
}

async function fetchWeather(){
  try{
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${CFG.lat}&longitude=${CFG.lon}&current=temperature_2m,weathercode&temperature_unit=fahrenheit`);
    const d=await r.json(); const t=Math.round(d.current.temperature_2m); const c=d.current.weathercode;
    const w=c<=1?'Clear':c<=3?'Partly cloudy':c<=48?'Foggy':c<=67?'Rain':c<=77?'Snow':'Stormy';
    return{display:`${t}°F · ${w}`};
  }catch(e){ return{display:'Red Hook, Brooklyn'}; }
}

// BRIEFING RUNNER
// ================================================================
async function runBriefing(){
  if(S.loading) return;
  if(!CFG.key){ toast('API key not set — go to Settings',true); set({nav:'settings'}); return; }
  if(!CFG.url){ toast('Apps Script URL not set — go to Settings',true); set({nav:'settings'}); return; }
  set({loading:true});
  try{
    const wx = await fetchWeather();
    set({weather:wx});

    const brainItems = S.inbox.filter(i=>i.status==='pending').map(i=>i.text);
    const carryOver = S.tasks.filter(t=>t.eodStatus==='carry').map(t=>t.title);

    const result = await callAppsScriptGET({
      action:'generateBriefing', key:CFG.key,
      brainItems:JSON.stringify(brainItems),
      carryOver:JSON.stringify(carryOver)
    });
    if(result.error) throw new Error(result.error);
    const briefing = result.briefing;

    // Store briefing in localStorage (session cache for today)
    localStorage.setItem('fgw_briefing', JSON.stringify(briefing));
    localStorage.setItem('fgw_briefing_date', new Date().toDateString());

    if(briefing.calendarToday) set({calEvents: briefing.calendarToday});

    // Build tasks from briefing
    const existingIds = new Set(S.tasks.map(t=>t.id));
    const newTasks = [
      ...(briefing.bucket1||[]).map(t=>({...t,bucket:1,done:false,eodStatus:null})),
      ...(briefing.bucket2||[]).map(t=>({...t,bucket:2,done:false,eodStatus:null})),
      ...(briefing.bucket3||[]).map(t=>({...t,bucket:3,done:false,eodStatus:null})),
    ].filter(t => !existingIds.has(t.id));

    // Preserve manually added tasks that aren't done or dropped
    const manualSources = new Set(['manual','quick-capture','inbox']);
    const manualTasks = S.tasks.filter(t =>
      manualSources.has(t.source) && !t.done && t.eodStatus !== 'drop'
    );

    // Carry over tasks from previous EOD
    const prevCarry = S.tasks.filter(t=>t.eodStatus==='carry').map(t=>({...t,eodStatus:null,meta:'(carried over) '+(t.meta||'')}));

    // Merge: carry-overs + manual tasks + new briefing tasks (no duplicates)
    const allPreservedIds = new Set([...prevCarry.map(t=>t.id), ...manualTasks.map(t=>t.id)]);
    const mergedTasks = [...prevCarry, ...manualTasks, ...newTasks.filter(t=>!allPreservedIds.has(t.id))];

    set({briefing, tasks:mergedTasks, loading:false, tab:'morning'});

    // Persist ALL tasks to Supabase — this is the real persistence
    await dbSaveTasks(mergedTasks);

    // Sync contacts from briefing
    if(briefing.newContacts?.length) {
      for (const c of briefing.newContacts) {
        if (c.email) {
          try { await sb.upsert('contacts', { email:c.email, name:c.name||'', company:c.company||'', type:c.type||'client' }); } catch(e){}
        }
      }
    }
  }catch(e){
    set({loading:false});
    toast('Briefing error: '+e.message, true);
  }
}

async function toggleTask(id){
  const task = S.tasks.find(t=>t.id===id);
  if(!task) return;
  const updated = {...task, done:!task.done};
  set({tasks:S.tasks.map(t=>t.id===id?updated:t)});
  await dbSaveTask(updated);
}

async function setEOD(id,st){
  const task = S.tasks.find(t=>t.id===id);
  if(!task) return;
  const updated = {...task, eodStatus:st, done:st==='done'};
  set({tasks:S.tasks.map(t=>t.id===id?updated:t)});
  await dbSaveTask(updated);
}

async function addInbox(item){
  const newItem = {id:'i_'+Date.now(),status:'pending',source:'manual',created:new Date().toISOString(),...item};
  set({inbox:[...S.inbox,newItem]});
  await dbSaveInboxItem(newItem);
}

async function approveInbox(id){
  const item=S.inbox.find(i=>i.id===id); if(!item)return;
  if(!item.date){ set({dateQueue:[...S.dateQueue,item]}); return false; }
  const newTask = {
    id:'t_'+Date.now(), bucket:1, title:item.text,
    meta:`Added from ${item.source||'inbox'}`,
    domain:item.domain||'FGW', priority:item.priority||'medium',
    est:'15m', done:false, eodStatus:null, dueDate:item.date,
    gmailLink:'', threadId:'', source:'inbox'
  };
  const updatedItem = {...item, status:'approved'};
  set({tasks:[...S.tasks,newTask], inbox:S.inbox.map(i=>i.id===id?updatedItem:i)});
  await dbSaveTask(newTask);
  await dbSaveInboxItem(updatedItem);
  return true;
}

function removeInbox(id){
  const item = S.inbox.find(i=>i.id===id);
  if(item) {
    set({inbox:S.inbox.map(i=>i.id===id?{...i,status:'removed'}:i)});
    dbSaveInboxItem({...item, status:'removed'});
  }
}

function resolveDate(id,date,time){
  const item=S.dateQueue.find(i=>i.id===id); if(!item)return;
  const newTask = {
    id:'t_'+Date.now(), bucket:1, title:item.text,
    meta:`Due ${date}${time?' at '+time:''}`,
    domain:item.domain||'FGW', priority:item.priority||'medium',
    est:'15m', done:false, eodStatus:null, dueDate:date,
    gmailLink:'', threadId:'', source:'inbox'
  };
  set({tasks:[...S.tasks,newTask], dateQueue:S.dateQueue.filter(i=>i.id!==id), inbox:S.inbox.map(i=>i.id===item.id?{...i,status:'approved',date,time}:i)});
  dbSaveTask(newTask);
}

async function saveInboxEdit(id){
  const text = document.getElementById('itxt_'+id)?.value?.trim();
  const domain = document.getElementById('idom_'+id)?.value;
  const priority = document.getElementById('ipri_'+id)?.value;
  const date = document.getElementById('idate_'+id)?.value;
  if(!text) return;
  const updated = S.inbox.map(i=>i.id===id?{...i,text,domain,priority,date:date||null}:i);
  set({inbox:updated});
  const item = updated.find(i=>i.id===id);
  await dbSaveInboxItem(item);
  await approveInbox(id);
}

function toggleInboxEdit(id){
  const el = document.getElementById('iedit_'+id);
  if(!el) return;
  el.classList.toggle('show');
}

async function saveEOD(){
  const notes=document.getElementById('eod-notes-val')?.value||'';
  const done=S.tasks.filter(t=>t.eodStatus==='done').length;
  const carry=S.tasks.filter(t=>t.eodStatus==='carry').length;
  const dropped=S.tasks.filter(t=>t.eodStatus==='drop').length;
  const remaining = S.tasks.filter(t=>t.eodStatus!=='done'&&t.eodStatus!=='drop').map(t=>({...t,eodStatus:null}));

  set({eodNotes:notes, tasks:remaining});

  // Persist EOD log to Supabase
  await dbSaveEOD(notes, done, carry, dropped, S.tasks);
  // Persist remaining tasks
  await dbSaveTasks(remaining);

  toast(`Day saved. ${carry} tasks carrying over.`);
}

async function showSummary(threadId, title){
  if(!CFG.url||!CFG.key){ toast('API key and URL required',true); return; }
  document.getElementById('drawer-title').textContent = title;
  document.getElementById('drawer-subtitle').textContent = 'Analyzing thread...';
  document.getElementById('drawer-body').innerHTML = `<div style="text-align:center;padding:40px;color:var(--hint)"><div style="margin-bottom:8px">Reading thread & generating summary...</div><div style="width:180px;height:2px;background:var(--border);border-radius:2px;margin:0 auto;overflow:hidden"><div style="height:100%;background:var(--text);border-radius:2px;animation:lf 2s ease infinite alternate"></div></div></div>`;
  document.getElementById('thread-drawer').classList.add('open');
  document.getElementById('drawer-backdrop').classList.add('show');

  try {
    const result = await callAppsScriptGET({ action:'summarizeThread', key:CFG.key, threadId, subject:title });
    if(result.error) throw new Error(result.error);

    const summary = result.summary;
    const history = result.history||[];
    const gmailLink = result.gmailLink||`https://mail.google.com/mail/u/0/#inbox/${threadId}`;

    document.getElementById('drawer-subtitle').innerHTML = `${result.messageCount} messages · <a href="${gmailLink}" target="_blank" style="color:var(--blue);text-decoration:none">Open in Gmail ↗</a>`;

    const formatted = summary
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/^- /gm, '• ')
      .split('\n').map(l=>`<p style="margin:0 0 6px">${l}</p>`).join('');

    document.getElementById('drawer-body').innerHTML = `
      <div style="font-size:13px;line-height:1.75;color:var(--text)">${formatted}</div>
      <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
        <button onclick="toggleRaw('raw_${threadId}')" style="font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;padding:0">Show full thread ↓</button>
      </div>
      <div id="raw_${threadId}" style="display:none;margin-top:12px">
        ${history.map(msg=>{
          const fromName = msg.from.replace(/<.+>/,'').trim().replace(/"/g,'');
          return `<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)">
            <div style="display:flex;justify-content:space-between;margin-bottom:5px">
              <span style="font-size:12px;font-weight:500;color:${msg.isInternal?'var(--blue)':'var(--text)'}">${fromName}</span>
              <span style="font-size:11px;color:var(--hint);font-family:var(--mono)">${msg.dateFormatted}</span>
            </div>
            <div style="font-size:12px;color:var(--muted);line-height:1.6;white-space:pre-wrap">${msg.body}</div>
          </div>`;
        }).join('')}
      </div>`;
  } catch(e) {
    document.getElementById('drawer-body').innerHTML = `<div style="color:var(--red);font-size:13px">${e.message}</div>`;
  }
}

async function updateLeadStage(threadId, stage){
  if (!threadId || threadId === 'undefined') return;
  try {
    await sb.update('leads', threadId, {stage}, 'thread_id');
    if (CFG.url) callAppsScriptGET({action:'updateLeadStage', threadId, stage}).catch(()=>{});
    toast(`Stage updated: ${stage}`);
    if (S.briefing?.leads) {
      S.briefing.leads = S.briefing.leads.map(l => l.threadId===threadId ? {...l, stage} : l);
      render();
    }
  } catch(e) { toast('Error updating stage: '+e.message, true); }
}

function isPastDue(dateStr){
  if(!dateStr || dateStr==='TBD') return false;
  return new Date(dateStr) < new Date(new Date().toDateString());
}

function formatDueDate(dateStr){
  if(!dateStr || dateStr==='TBD') return 'TBD';
  const d = new Date(dateStr);
  const today = new Date(new Date().toDateString());
  const diff = Math.round((d - today) / 86400000);
  if(diff === 0) return 'Today';
  if(diff === 1) return 'Tomorrow';
  if(diff === -1) return 'Yesterday';
  if(diff < 0) return `${Math.abs(diff)}d overdue`;
  if(diff <= 7) return `${diff}d`;
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

async function saveTaskEdit(id){
  const title = document.getElementById('et-title')?.value?.trim();
  if(!title){ toast('Title required',true); return; }
  const meta = document.getElementById('et-meta')?.value?.trim();
  const dueDate = document.getElementById('et-date')?.value || null;
  const priority = document.getElementById('et-priority')?.value || 'medium';
  const domain = document.getElementById('et-domain')?.value || 'FGW';
  const est = document.getElementById('et-est')?.value || '15m';
  const bucket = parseInt(document.getElementById('et-bucket')?.value) || 1;

  const updated = S.tasks.map(t => t.id===id ? {...t, title, meta, dueDate, priority, domain, est, bucket} : t);
  set({tasks: updated});
  const task = updated.find(t=>t.id===id);
  await dbSaveTask(task);
  closeDrawer();
  toast('Task saved');
}

async function deleteTask(id){
  if(!confirm('Delete this task?')) return;
  const tasks = S.tasks.filter(t=>t.id!==id);
  set({tasks});
  try { await sb.delete('tasks', id); } catch(e){}
  closeDrawer();
  toast('Task deleted');
}

function renderMorningTab(){
  const b=S.briefing;
  if(!b) return renderEmpty();

  // Apply task filter
  let tasks = S.tasks;
  const f = S.taskFilter;
  if(f==='done') tasks = tasks.filter(t=>t.done);
  else if(f==='remaining') tasks = tasks.filter(t=>!t.done);
  else if(f==='overdue') tasks = tasks.filter(t=>!t.done&&t.dueDate&&t.dueDate!=='TBD'&&isPastDue(t.dueDate));
  else tasks = tasks.filter(t=>!t.done); // default: hide done

  const b1=tasks.filter(t=>t.bucket===1), b2=tasks.filter(t=>t.bucket===2), b3=tasks.filter(t=>t.bucket===3);

        <div><div style="font-size:17px;font-weight:500">${c.name||''}</div><div style="font-size:13px;color:var(--muted)">${c.company||''} ${c.email?'· '+c.email:''}</div></div>
      </div>
      ${c.notes?`<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:7px">Notes</div><div style="background:var(--s2);border-radius:6px;padding:8px 10px;font-size:13px">${c.notes}</div></div>`:''}
      <div><div style="font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:7px">Add Note</div>
        <textarea class="fb-area" id="cust-note" placeholder="Add a note..."></textarea>
        <div class="btn-row"><button class="btn btn-p" style="font-size:12px" onclick="addCustNote('${c.id}')">Save note</button></div>
      </div>
    </div>`;
  }
  return `<div style="padding:14px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
    <div><div style="font-size:15px;font-weight:500">Customer Records</div><div style="font-size:12px;color:var(--muted);margin-top:1px">${S.customers.length} contacts · synced from Supabase</div></div>
    <button class="btn btn-p" style="font-size:12px" onclick="showAddCust()">+ Add</button>
  </div>
  <div style="padding:0 22px"><input type="text" class="add-inp" id="cust-search" placeholder="Search..." oninput="renderCustList(this.value)" style="margin:10px 0"></div>
  <div id="cust-list" style="padding:0 22px">
    ${S.customers.length?S.customers.map(c=>`<div class="cust-row" onclick="set({custDetail:'${c.id}'})">
      <div class="av">${initials(c.name)}</div>
      <div style="flex:1"><div class="cname">${c.name||''}</div><div class="cmeta">${c.company||c.email||''}</div><div class="clast">${c.type?badge(c.type):''} ${c.last_seen?'· '+timeAgo(c.last_seen):''}</div></div>
    </div>`).join(''):'<div class="empty">No contacts yet. Run a briefing to start building your contact list.</div>'}
  </div>`;
}

function renderSettings(){
  return `<div class="settings-wrap">
    <div style="font-size:16px;font-weight:500;margin-bottom:3px">Settings</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:22px">Configure API connections</div>

    <div class="set-block">
      <div class="set-lbl">Claude API Key</div>
      <div class="set-sub">From console.anthropic.com. Stored locally in your browser only — never sent anywhere except the Claude API.</div>
      <input type="password" class="set-inp" id="key-inp" placeholder="sk-ant-api03-..." value="${CFG.key?'••••••••••••••••••••':''}">
      <div class="btn-row">
        <button class="btn btn-p" style="font-size:12px" onclick="saveKey()">Save API key</button>
        ${CFG.key?'<span style="font-size:12px;color:var(--green);padding:6px 0">✓ Key configured</span>':''}
      </div>
    </div>

    <div class="set-block">
      <div class="set-lbl">Google Apps Script URL</div>
      <div class="set-sub">Deploy the Code.gs file as a Web App. This connects to your Gmail and Calendar.</div>
      <input type="text" class="set-inp" id="url-inp" placeholder="https://script.google.com/macros/s/..." value="${CFG.url||''}">
      <div class="btn-row">
        <button class="btn btn-p" style="font-size:12px" onclick="saveUrl()">Save URL</button>
        <button class="btn" style="font-size:12px" onclick="testUrl()">Test connection</button>
        ${CFG.url?'<span style="font-size:12px;color:var(--green);padding:6px 0">✓ URL configured</span>':''}
      </div>
      <div id="url-test-result" style="font-size:12px;margin-top:7px"></div>
    </div>

    <div class="set-block">
      <div class="set-lbl">Supabase</div>
      <div class="set-sub">Connected to project FGW Command Center. All tasks, inbox items, contacts, leads, call logs, and EOD records are stored here.</div>
      <div class="url-display">${SB_URL}</div>
      <div style="margin-top:8px"><span class="sync-badge ok">✓ Connected</span></div>
    </div>

    <div class="set-block">
      <div class="set-lbl">Setup code for new machines</div>
      <div class="set-sub">Open the dashboard on any machine, paste this in the browser console (Cmd+Option+J), hit Enter.</div>
      <div class="url-display">localStorage.setItem('fgw_key','YOUR_CLAUDE_KEY');\nlocalStorage.setItem('fgw_url','${CFG.url||'YOUR_APPS_SCRIPT_URL'}');</div>
    </div>

    <div class="set-block">
      <div class="set-lbl">This page's URL</div>
      <div class="url-display">${window.location.href}</div>
    </div>
  </div>`;
}

function renderDashboard(){
  return `
    <div class="tab-bar">
      <button class="tb ${S.tab==='morning'?'on':''}" onclick="setTab('morning')">Morning</button>
      <button class="tb ${S.tab==='eod'?'on':''}" onclick="setTab('eod')">End of Day</button>
    </div>
    <div id="tab-content">${S.tab==='morning'?renderMorningTab():renderEODTab()}</div>
  `;
}

function render(){
  const shell = document.getElementById('shell');
  if(!shell) return;
  shell.innerHTML = `
    ${renderTopBar()}
    <div id="hdr-area">${renderHeader()}</div>
    <div class="main">
      <div class="left" id="left-content">
        ${S.nav==='dashboard'?renderDashboard():S.nav==='customers'?renderCustomers():renderSettings()}
      </div>
      <div class="right" id="right-panel">
        ${renderRightPanel()}
      </div>
    </div>
  `;
  bindPhotoInput();
}

// ================================================================
// EVENT HANDLERS
// ================================================================
function setFilter(f){ set({taskFilter: S.taskFilter===f ? null : f}); }

function setNav(n){ set({nav:n,custDetail:null}); }
function setTab(t){ set({tab:t}); }

async function addBlock(btn, encoded){
  const b = JSON.parse(decodeURIComponent(encoded));
  btn.textContent='Adding...'; btn.disabled=true;
  try{
    const d = await fetchAppsScript('createEvent',{event:{summary:b.label,description:b.description,duration:b.duration||30}});
    if(d?.status==='created'){ btn.textContent='✓ Added'; btn.className='cadd added'; }
    else throw new Error('Failed');
  }catch(e){ btn.textContent='+Cal'; btn.disabled=false; toast('Add to calendar: '+e.message,true); }
}

async function processDumpBtn(){
  const text = document.getElementById('dump-inp')?.value?.trim(); if(!text)return;
  const btn = document.querySelector('#dump-inp~.d-acts .pri');
  if(btn){btn.textContent='Processing...';btn.disabled=true;}
  try{
    if(CFG.url) await fetchAppsScript('saveBrainDump',{text,source:'brain dump',timestamp:new Date().toISOString()});
    const result = await callAppsScriptGET({action:'processDump',key:CFG.key,text});
    if(result.error) throw new Error(result.error);
    const items = result.items||[];
    for(const item of items) await addInbox({text:item.text,domain:item.domain||'FGW',date:item.hasDate?item.dateText:null,priority:item.priority||'medium',source:'brain dump'});
    if(document.getElementById('dump-inp')) document.getElementById('dump-inp').value='';
    toast(`${items.length} items added to inbox`);
  }catch(e){ toast('Error: '+e.message,true); }
  finally{ if(btn){btn.textContent='Process →';btn.disabled=false;} }
}

async function addManualTask(){
  const t=document.getElementById('add-task-inp')?.value?.trim(); if(!t)return;
  const domain=document.getElementById('add-domain')?.value||'FGW';
  const date=document.getElementById('add-date')?.value||null;
  const newTask = {id:'t_'+Date.now(),bucket:1,title:t,meta:date?`Due ${date}`:'Added manually',domain,est:'15m',priority:'medium',done:false,eodStatus:null,dueDate:date,gmailLink:'',threadId:'',source:'manual'};
  set({tasks:[...S.tasks,newTask]});
  if(document.getElementById('add-task-inp')) document.getElementById('add-task-inp').value='';
  await dbSaveTask(newTask);
  toast('Task added');
}

async function quickCapture(){
  const text=document.getElementById('quick-cap-inp')?.value?.trim(); if(!text)return;
  const domain=document.getElementById('quick-domain')?.value||'FGW';
  const priority=document.getElementById('quick-priority')?.value||'medium';
  const newTask = {id:'t_'+Date.now(),bucket:1,title:text,meta:`${domain} · ${priority} priority`,domain,est:'15m',priority,done:false,eodStatus:null,dueDate:null,gmailLink:'',threadId:'',source:'quick-capture'};
  set({tasks:[...S.tasks,newTask]});
  if(document.getElementById('quick-cap-inp')) document.getElementById('quick-cap-inp').value='';
  await dbSaveTask(newTask);
  // Also save to Apps Script todos for nightly pickup
  if(CFG.url) callAppsScriptGET({action:'addTodo',text,domain,priority}).catch(()=>{});
  toast('Captured');
}

function approveAllDated(){ S.inbox.filter(i=>i.status==='pending'&&i.date).forEach(i=>approveInbox(i.id)); toast('Approved all dated items'); }

async function submitFeedback(){
  const text=document.getElementById('fb-inp')?.value?.trim(); if(!text)return;
  try {
    await sb.insert('feedback', {text});
    if(document.getElementById('fb-inp')) document.getElementById('fb-inp').value='';
    toast('Feedback saved — applied to next briefing');
  } catch(e) { toast('Error saving feedback',true); }
}

async function addCustNote(id){
  const text=document.getElementById('cust-note')?.value?.trim(); if(!text)return;
  const c = S.customers.find(x=>x.id===id); if(!c)return;
  const newNotes = (c.notes||'')+'\n'+new Date().toLocaleDateString()+': '+text;
  try {
    await sb.update('contacts', id, {notes: newNotes.trim()});
    const customers=S.customers.map(x=>x.id===id?{...x,notes:newNotes.trim()}:x);
    set({customers});
    toast('Note saved');
  } catch(e) { toast('Error saving note',true); }
}

function renderCustList(q=''){
  const list=document.getElementById('cust-list'); if(!list)return;
  const filtered=S.customers.filter(c=>[c.name,c.company,c.email].filter(Boolean).join(' ').toLowerCase().includes(q.toLowerCase()));
  list.innerHTML=filtered.length?filtered.map(c=>`<div class="cust-row" onclick="set({custDetail:'${c.id}'})"><div class="av">${initials(c.name)}</div><div style="flex:1"><div class="cname">${c.name||''}</div><div class="cmeta">${c.company||c.email||''}</div></div></div>`).join(''):'<div class="empty">No matches</div>';
}

async function showAddCust(){
  const name=prompt('Customer name:'); if(!name)return;
  const email=prompt('Email (optional):');
  const company=prompt('Company (optional):');
  try {
    const rows = await sb.insert('contacts', {email:email||'noemail_'+Date.now()+'@unknown.com',name,company:company||'',type:'client'});
    const newContact = rows[0];
    set({customers:[...S.customers, newContact]});
    toast('Contact added');
  } catch(e) { toast('Error: '+e.message,true); }
}

function saveKey(){
  const v=document.getElementById('key-inp')?.value?.trim();
  if(v&&!v.includes('•')){ localStorage.setItem('fgw_key',v); toast('API key saved'); render(); }
}
function saveUrl(){
  const v=document.getElementById('url-inp')?.value?.trim();
  if(v){ localStorage.setItem('fgw_url',v); toast('Script URL saved'); render(); }
}
async function testUrl(){
  const url=document.getElementById('url-inp')?.value?.trim()||CFG.url;
  const res=document.getElementById('url-test-result'); if(!url||!res)return;
  res.textContent='Testing...'; res.style.color='var(--muted)';
  try{
    const r=await fetch(url+'?action=ping');
    if(r.ok){res.textContent='✓ Connection successful';res.style.color='var(--green)';}
    else{res.textContent=`Error ${r.status}`;res.style.color='var(--red)';}
  }catch(e){res.textContent='Connection failed: '+e.message;res.style.color='var(--red)';}
}

function bindPhotoInput(){
  const inp=document.getElementById('ph-inp'); if(!inp)return;
  inp.addEventListener('change',async(e)=>{
    const file=e.target.files[0]; if(!file)return;
    const status=document.getElementById('ph-status'); if(status)status.textContent='Reading handwriting...';
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
      const result=await callAppsScriptGET({action:'processImage',key:CFG.key,b64,mime:file.type});
      const items=result.items||[];
      for(const item of items) await addInbox({text:item.text,domain:item.domain||'FGW',date:item.hasDate?item.dateText:null,source:'handwritten note',priority:item.priority||'medium'});
      if(status)status.textContent=`${items.length} items extracted`;
      setTimeout(()=>{if(status)status.textContent='';},3000);
    }catch(e){if(status)status.textContent='Error: '+e.message;}
  });
}

// ================================================================
// CLOCK
// ================================================================
setInterval(()=>{
  const c=document.getElementById('clk-display'); if(c)c.textContent=fmtTime();
  const h=document.getElementById('hdr-time'); if(h)h.textContent=fmtTime();
},30000);

// ================================================================
// INIT — load from Supabase on startup
// ================================================================
async function init(){
  // Load weather immediately
  const wx=await fetchWeather();
  S.weather=wx;

  // Load state from Supabase (source of truth)
  try {
    const state = await dbLoadState();
    S.tasks = state.tasks;
    S.inbox = state.inbox;
    S.customers = state.contacts;
  } catch(e) {
    console.error('Failed to load from Supabase:', e.message);
    // Fall back to localStorage session cache
    S.tasks = JSON.parse(localStorage.getItem('fgw_tasks')||'[]');
    S.inbox = JSON.parse(localStorage.getItem('fgw_inbox')||'[]');
  }

  // Check for today's briefing in localStorage (session cache)
  const storedDate=localStorage.getItem('fgw_briefing_date');
  if(storedDate===new Date().toDateString()){
    const stored=localStorage.getItem('fgw_briefing');
    if(stored){ try{ S.briefing=JSON.parse(stored); }catch(e){} }
  }

  document.getElementById('loading').style.display='none';
  document.getElementById('shell').style.display='flex';
  render();
}

init();
</script>
